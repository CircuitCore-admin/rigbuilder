name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Biome check
        run: npm run lint

      - name: TypeScript check (backend)
        run: npx tsc --noEmit
        working-directory: backend

      - name: TypeScript check (frontend)
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rigbuilder
          POSTGRES_PASSWORD: rigbuilder
          POSTGRES_DB: rigbuilder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://rigbuilder:rigbuilder@localhost:5432/rigbuilder_test
      SESSION_SECRET: test-session-secret-min-32-chars-long
      CSRF_SECRET: test-csrf-secret-min-32-chars-long
      CORS_ORIGIN: http://localhost:5173

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: backend

      - name: Run tests
        run: npm test
        working-directory: backend
